name: Update TryHackMe Stats Image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-tryhackme-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Capture TryHackMe stats
        run: npm run thm-stats

      - name: Commit updated image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/tryhackme-stats.png assets/tryhackme-profile-full.png

          if git diff --cached --quiet; then
            echo "No image changes to commit"
            exit 0
          fi

          git commit -m "Update TryHackMe stats image"
          git push
