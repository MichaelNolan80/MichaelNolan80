name: Update TryHackMe Badge
 
on:
  schedule:
    - cron: '0 6 * * *'   # runs daily at 06:00 UTC — adjust as you like
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
 
jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Download latest TryHackMe badge
        run: |
          mkdir -p assets
          curl -sL "https://tryhackme.com/api/v2/badges/public-profile?userPublicId=67b10cccf43e1ded31a8987c" -o assets/tryhackme-badge.png
          # If this ever stops working (TryHackMe changes its API), get a fresh
          # embed URL from your profile page's badge/share option and swap it in.
 
      - name: Validate downloaded file is an image
        run: |
          file_type=$(file --mime-type -b assets/tryhackme-badge.png)
          if [[ "$file_type" != image/* ]]; then
            echo "Downloaded file isn't an image (got: $file_type). Aborting so we don't commit a broken badge."
            cat assets/tryhackme-badge.png
            exit 1
          fi
 
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/tryhackme-badge.png
          if git diff --cached --quiet; then
            echo "No changes to badge — skipping commit"
            exit 0
          fi
          git commit -m "Update TryHackMe badge"
          git push
